<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="project-label">
        <span>Daily UI 001</span>
        <strong>Sign Up — Imperial Clone Initiative</strong>
    </div>

    <div class="main-wrapper">
        <section class="glass-card show-signup" id="auth-container">
            
            <div class="auth-content signup-content">
                <header class="brand-header">
                    <h1 class="title-gradient">JOIN THE LAB</h1>
                    <p class="subtitle">Empezá tu camino experimental hoy.</p>
                </header>

                <form id="signup-form">
                    <div class="input-group">
                        <input type="text" required placeholder=" ">
                        <label>Nombre completo</label>
                    </div>
                    <div class="input-group">
                        <input type="email" required placeholder=" ">
                        <label>Email</label>
                    </div>
                    <div class="input-group">
                        <input type="password" required placeholder=" ">
                        <label>Contraseña</label>
                    </div>
                    <button type="submit" class="cta-button">CREAR CUENTA</button>
                </form>
                
                <footer class="form-footer">
                    <p>¿Ya tenés cuenta? <span class="toggle-link" id="to-login">Iniciá sesión</span></p>
                </footer>
            </div>

            <div class="auth-content login-content">
                <header class="brand-header">
                    <h1 class="title-gradient">WELCOME BACK</h1>
                    <p class="subtitle">Continuá tu sesión en el laboratorio.</p>
                </header>

                <form id="login-form">
                    <div class="input-group">
                        <input type="email" required placeholder=" ">
                        <label>Email</label>
                    </div>
                    <div class="input-group">
                        <input type="password" required placeholder=" ">
                        <label>Contraseña</label>
                    </div>
                    <button type="submit" class="cta-button">INGRESAR</button>
                </form>
                
                <footer class="form-footer">
                    <p>¿No tenés cuenta? <span class="toggle-link" id="to-signup">Registrate</span></p>
                </footer>
            </div>

        </section>
    </div>
    
    
    <div class="code-wrapper" id="codeWrapper">
    <div class="code-tabs">
        <button data-code="html">HTML</button>
        <button data-code="css">CSS</button>
        <button data-code="js">JS</button>
        <button id="closeCode">Cerrar</button>
    </div>

    <pre><code id="codeDisplay"></code></pre>
</div>

<button class="dev-toggle" id="openCode">Ver cómo está hecho</button>



    <script src="script.js"></script>
</body>
</html>
